name: Deploy Supabase Edge Functions

on:
  push:
    branches: [main, 'claude/**']
    paths:
      - 'supabase/functions/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy all Edge Functions (retry flaky 500s)
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          for attempt in 1 2 3 4 5; do
            echo "::group::Deploy attempt $attempt"
            if supabase functions deploy --project-ref josabyyaarhlgepfelid --use-api; then
              echo "::endgroup::"
              echo "Deploy succeeded on attempt $attempt"
              exit 0
            fi
            echo "::endgroup::"
            echo "Attempt $attempt failed (likely a transient bundler 500) — retrying in $((attempt * 10))s"
            sleep $((attempt * 10))
          done
          echo "All deploy attempts failed"
          exit 1
